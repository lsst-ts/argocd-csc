namespace: maintel
image:
  repository: ts-dockerhub.lsst.org/mtoods
  tag: m0001
  pullPolicy: Always
  nexus3: nexus3-docker
env:
  LSST_DDS_PARTITION_PREFIX: base
  OSPL_INFOFILE: /tmp/ospl-info-mtoods.log
  OSPL_ERRORFILE: /tmp/ospl-error-mtoods.log
  CTRL_OODS_CONFIG_FILE: /etc/mtoods.yaml
  AWS_ACCESS_KEY_ID: lsstcam
  AWS_ENDPOINT_URL: https://s3-butler.ls.lsst.org
envSecrets:
- name: AWS_SECRET_ACCESS_KEY
  secretName: butler
  secretKey: lsstcam-raw-secret-access-key
shmemDir: /run/ospl
osplVersion: V6.10.4
butlerSecret:
  containerPath: &bS-cP /home/saluser/.lsst
  dbUser: oods
secretPermFixer:
- name: butler-secret
  containerPath: *bS-cP
configfile:
  path: /etc
  filename: mtoods.yaml
  content: |
    defaultInterval: &interval
        days: 0
        hours: 0
        minutes: 0
        seconds: 0

    ingester:
        kafka:
            brokers:
                - sasquatch-kafka-brokers.sasquatch:9092
            topics:
                - mtoods
            group_id: MTOODS
            max_messages: 10
        butlers:
            - butler:
                instrument: lsst.obs.lsst.LsstCam
                class:
                    import : lsst.ctrl.oods.messageAttendant
                    name : MessageAttendant
                repoDirectory : /tmp/repo/LSSTCam
                collections:
                    - LSSTCam/raw/all
                scanInterval:
                    <<: *interval
                    seconds: 10
                filesOlderThan:
                    <<: *interval
                    seconds: 30
        batchSize: 20
